name: Self-Healing MLOps Pipeline

on:
  schedule:
    # Run drift monitoring every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual triggers

jobs:
  monitor-and-heal:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout only; no writes back to the repo
      actions: write   # required to upload artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data
        run: python -m src.generate_data

      - name: Run drift monitor and auto-retrain
        run: python -m src.retrain_trigger

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: drift-report
          path: data/drift_report.json

      - name: Upload retrained model (if any)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: retrained-models
          path: models/*.pkl
          if-no-files-found: ignore
