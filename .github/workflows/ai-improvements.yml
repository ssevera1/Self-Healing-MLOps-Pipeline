name: Continuous Improvement

on:
  schedule:
    - cron: '37 21 * * 1'   # Mon 9:37pm UTC  (4:37pm CDT)
    - cron: '14 10 * * 3'   # Wed 10:14am UTC (5:14am CDT)
    - cron: '52 15 * * 6'   # Sat 3:52pm UTC  (10:52am CDT)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Jitter
        run: sleep $((RANDOM % 900))

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic --quiet

      - name: Improve
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GIT_AUTHOR_NAME: Scott Severance
          GIT_AUTHOR_EMAIL: scott@scottseverance.net
          GIT_COMMITTER_NAME: Scott Severance
          GIT_COMMITTER_EMAIL: scott@scottseverance.net
        run: python scripts/ai_improve.py
